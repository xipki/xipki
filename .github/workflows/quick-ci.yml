name: Quick CI

on:
  pull_request:
    branches: [ "master" ]
  push:
    branches: [ "master" ]

jobs:
  build-and-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Compile
        run: mvn -DskipTests clean install

      - name: Java indentation lint
        run: sh tools/check-java-indent.sh

      - name: Targeted unit tests (security-sensitive modules)
        run: mvn -B -ntp -DskipTests -pl gateway,security -am test
