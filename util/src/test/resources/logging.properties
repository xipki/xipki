# 1. Register both Console and File handlers
#handlers = java.util.logging.ConsoleHandler, java.util.logging.FileHandler
handlers = java.util.logging.FileHandler

# 2. Global default level
.level = INFO

# --- Console Configuration ---
#java.util.logging.ConsoleHandler.level = INFO
#java.util.logging.ConsoleHandler.formatter = java.util.logging.SimpleFormatter

# --- File Configuration ---
# Path pattern: %h is user home, %t is temp system folder, %g is generation number
java.util.logging.FileHandler.pattern = target/testlog-%g.log
# 10 MB
java.util.logging.FileHandler.limit = 10485760
java.util.logging.FileHandler.count = 20
java.util.logging.FileHandler.append = true
java.util.logging.FileHandler.level = ALL
java.util.logging.FileHandler.formatter = java.util.logging.SimpleFormatter

# Optional: Set the format for both
java.util.logging.SimpleFormatter.format = %1$tF %1$tT [%4$s] %2$s - %5$s%n

org.xipki.pkcs11.wrapper.level = DEBUG
org.xipki.xihsm.level = INFO
